version: '3.8'

services:
  travel-planner-api:
    image: sydorenkodmytro2021/travel-planner-api:latest
    container_name: travel-planner-api

    ports:
      - "8000:8000"

    environment:
      - APP_VERSION=local-dev
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/travel_db

    depends_on:
      - db

    pull_policy: if_not_present
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: travel-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

networks:
  default:
    name: travel_local_network

volumes:
  postgres_data:
  